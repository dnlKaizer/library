spring:
  application:
    name: library

  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/library}
    username: ${DATASOURCE_USER:root}
    password: ${DATASOURCE_PWD:}
    driver-class-name: ${DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: create-drop 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

api:
  security:
    token:
      secret: ${JWT_SECRET:library-secret-change-me}
      issuer: ${JWT_ISSUER:library-api}
      expiration-hours: ${JWT_EXPIRATION_HOURS:24}